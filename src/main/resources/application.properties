spring.application.name=crm
spring.config.import=optional:configserver:
spring.main.web-application-type=reactive
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.schema=crm
spring.datasource.hikari.connection-init-sql=CREATE SCHEMA IF NOT EXISTS crm
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=crm
spring.graphql.path=/graphql
spring.graphql.http.path=/graphql
spring.graphql.schema.locations=classpath:graphql/**/
spring.graphql.graphiql.enabled=true